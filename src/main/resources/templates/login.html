<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NareshIT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f2f2f2;
        }

        .auth-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            width: 900px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
        }

        .left {
            padding: 40px;
            width: 50%;
            background: white;
        }

        .right {
            width: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            text-align: center;
            padding: 30px;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #ff6a00, #ee0979);
            color: white;
            border: none;
        }
    </style>
</head>

<body>
<div class="auth-container">
    <div class="auth-card">

        <!-- LEFT -->
        <div class="left">
            <h3 class="mb-4">NareshIT</h3>
            <p>Please login to your account</p>

            <form action="/dashboard" method="get">
                <input type="text" name="username" class="form-control mb-3" placeholder="Username">
                <input type="password" name="password" class="form-control mb-3" placeholder="Password">

                <button class="btn btn-gradient w-100">LOGIN</button>
            </form>

            <p class="mt-3 text-center">
                <a href="/forgotpass">Forgot password?</a>
            </p>

            <p class="text-center">
                Don't have an account?
                <a href="/signup" class="btn btn-outline-danger btn-sm">Create New</a>
            </p>
        </div>

        <!-- RIGHT -->
        <div class="right">
            <div>
                <h4>NareshIT is more than just a Software Training Institute</h4>
                <p>Student satisfaction is our top priority.</p>
            </div>
        </div>

    </div>
</div>
</body>
</html>
