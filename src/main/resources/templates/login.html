<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NareshIT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f2f2f2;
        }

        .auth-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            width: 900px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
        }

        .left {
            padding: 40px;
            width: 50%;
            background: white;
        }

        .right {
            width: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            text-align: center;
            padding: 30px;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #ff6a00, #ee0979);
            color: white;
            border: none;
        }

        #alertBox {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            z-index: 9999;
        }
        .alert-success {
            background: #4CAF50;
        }
        .alert-error {
            background: #f44336;
        }
    </style>
</head>

<body>
<div class="auth-container">
    <div id="alertBox"
         th:if="${success != null or error != null}"
         th:text="${success != null ? success : error}"
         th:classappend="${success != null} ? 'alert-success' : 'alert-error'">
    </div>
    <div class="auth-card">

        <div class="left">
            <h3 class="mb-4">NareshIT</h3>
            <p>Please login to your account</p>

            <form th:action="@{/login}" th:method="post" th:object="${login}">
                <input type="text" th:field="*{email}" class="form-control mb-3" placeholder="Email">
                <input type="password" th:field="*{password}" class="form-control mb-3" placeholder="Password">
                <button class="btn btn-gradient w-100">LOGIN</button>
            </form>

            <p class="mt-3 text-center">
                <a href="/forgotpass">Forgot password?</a>
            </p>

            <p class="text-center">
                Don't have an account?
                <a href="/signup" class="btn btn-outline-danger btn-sm">Create New</a>
            </p>
        </div>

        <div class="right">
            <div>
                <h4>NareshIT is more than just a Software Training Institute</h4>
                <p>Student satisfaction is our top priority.</p>
            </div>
        </div>

    </div>
</div>
<script>
    setTimeout(function () {
        let alertBox = document.getElementById("alertBox");
        if (alertBox) {
            alertBox.style.transition = "opacity 0.5s";
            alertBox.style.opacity = "0";
            setTimeout(() => alertBox.remove(), 500);
        }
    }, 2500);
</script>
</body>
</html>
