<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock Account | NareshIT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="auth-container d-flex justify-content-center align-items-center vh-100">
    <div class="auth-card d-flex shadow" style="width:900px">

        <div class="left p-5 bg-white w-50">

            <h3>NareshIT</h3>
            <p>Unlock your account</p>

            <p>
                Your Email :
                <strong th:text="${email}">user@email.com</strong>
            </p>
            <p th:if="${unlockUser!=null}" th:text="${success}" class="text-success"></p>
            <p th:if="${unlockUser!=null}" th:text="${error}" class="text-danger"></p>

            <form th:action="@{/unlock}" th:method="post" th:object="${unlockUser}">

                <input type="hidden" name="email" th:value="${email}">

                <input type="text"
                       th:field="*{temporaryPassword}"
                       th:attr="value=${success} ? '' : *{temporaryPassword}"
                       class="form-control mb-3"
                       placeholder="Temporary Password" required>

                <input type="password"
                       th:field="*{newPassword}"
                       class="form-control mb-3"
                       placeholder="New Password" required>

                <input type="password" th:field="*{confirmPassword}"
                       class="form-control mb-3"
                       placeholder="Confirm Password" required>

                <button class="btn btn-danger w-100">UNLOCK</button>
            </form>

            <p class="text-center mt-3">
                Back to
                <a href="/login" class="btn btn-outline-primary btn-sm">Login</a>
            </p>

        </div>

        <div class="right text-white d-flex align-items-center justify-content-center w-50"
             style="background: linear-gradient(135deg,#ff6a00,#ee0979)">

            <div class="text-center p-4">
                <h4>NareshIT Training Institute</h4>
                <p>Build your career with real-time training.</p>
            </div>

        </div>

    </div>
</div>

</body>
</html>
