<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | NareshIT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="auth-container d-flex justify-content-center align-items-center vh-100">
    <div class="auth-card d-flex shadow" style="width:900px">

        <div class="left p-5 bg-white w-50">
            <h3>NareshIT</h3>
            <p>Create account</p>

            <form action="/signup" method="post">
                <input type="text" name="name" class="form-control mb-3" placeholder="Name">
                <input type="email" name="email" class="form-control mb-3" placeholder="Email">
                <input type="text" name="phone" class="form-control mb-3" placeholder="Phone">

                <button class="btn btn-danger w-100">SIGN UP</button>
            </form>

            <p class="text-center mt-3">
                Already have account?
                <a href="/login" class="btn btn-outline-primary btn-sm">Login</a>
            </p>
        </div>

        <div class="right text-white d-flex align-items-center justify-content-center w-50"
             style="background: linear-gradient(135deg,#ff6a00,#ee0979)">
            <div class="text-center p-4">
                <h4>NareshIT Training Institute</h4>
                <p>Build your career with real-time training.</p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
